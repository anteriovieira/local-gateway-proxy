<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy App</title>
</head>
<body>
  <div id="root"></div>
  <script>
    (function() {
      var MAX = 102400;
      var orig = window.fetch;
      window.fetch = function() {
        return orig.apply(this, arguments).then(function(res) {
          try {
            var clone = res.clone();
            clone.text().then(function(text) {
              if (text && text.length <= MAX) {
                try {
                  var u = res.url || '';
                  var path = '';
                  try { path = new URL(u).pathname; } catch(e) {}
                  chrome.runtime.sendMessage({
                    type: 'response-body',
                    payload: { url: u, method: (arguments[1] && arguments[1].method) || 'GET', pathname: path, body: text, timestamp: Date.now() }
                  }).catch(function(){});
                } catch(e) {}
              }
            }).catch(function(){});
          } catch(e) {}
          return res;
        });
      };
    })();
  </script>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
